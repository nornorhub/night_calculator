<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Thirds Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f4f3ef;
      --bg3: #eceae4;
      --text: #1a1a18;
      --text2: #5a5a55;
      --text3: #9a9890;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --btn-bg: #1a1a18;
      --btn-fg: #ffffff;
      --card-border: rgba(0,0,0,0.1);
      --bar-bg: #e0ddd5;
      --info-bg: #f4f3ef;
    }

    .dark-mode {
      --bg: #111110;
      --bg2: #1c1c1a;
      --bg3: #252522;
      --text: #e8e6df;
      --text2: #9a9890;
      --text3: #5a5a55;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --btn-bg: #e8e6df;
      --btn-fg: #111110;
      --card-border: rgba(255,255,255,0.08);
      --bar-bg: #2a2a27;
      --info-bg: #1c1c1a;
    }

    .app {
      background: var(--bg);
      min-height: 100vh;
      transition: background 0.25s, color 0.25s;
      padding: 32px 24px 48px;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      font-family: 'Amiri', serif;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text2);
      transition: all 0.2s;
      user-select: none;
    }
    .theme-toggle:hover { border-color: var(--border2); color: var(--text); }

    .toggle-icon { font-size: 14px; }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .moon-icon { font-size: 38px; display: block; margin-bottom: 10px; }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .header p {
      font-size: 15px;
      color: var(--text2);
      margin-top: 6px;
      font-style: italic;
    }

    .inputs-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .input-group .label-arabic {
      font-size: 20px;
      color: var(--text);
      display: block;
      margin-bottom: 2px;
      font-family: 'Amiri', serif;
      font-weight: 700;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'DM Mono', monospace;
    }

    .input-group input[type="time"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 22px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.25s;
      cursor: pointer;
    }
    .input-group input[type="time"]:focus { border-color: var(--border2); }

    .calc-btn {
      width: 100%;
      padding: 14px;
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Amiri', serif;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, background 0.25s, color 0.25s;
      margin-bottom: 32px;
      letter-spacing: 0.03em;
    }
    .calc-btn:hover { opacity: 0.85; }
    .calc-btn:active { opacity: 0.7; }

    .error {
      text-align: center;
      color: #c0392b;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      padding: 10px;
      display: none;
    }
    .error.visible { display: block; }

    .results { display: none; }
    .results.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .results-title {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .result-card {
      border: 1.5px solid var(--card-border);
      background: var(--bg2);
      border-radius: 14px;
      padding: 16px 22px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      transition: background 0.25s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }

    .result-card.first::before { background: #BA7517; }
    .result-card.half::before  { background: #185FA5; }

    .card-labels {
      display: flex;
      flex-direction: column;
    }

    .result-card .card-label-ar {
      font-size: 18px;
      color: var(--text);
      display: block;
      font-family: 'Amiri', serif;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .result-card .card-label-en {
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .result-card .card-time {
      font-size: 24px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      color: var(--text);
      text-align: right;
    }

    .night-bar-wrap { margin-top: 24px; margin-bottom: 8px; }

    .night-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .night-bar {
      height: 12px;
      border-radius: 6px;
      background: var(--bar-bg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .night-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 6px;
      width: 100%;
    }

    .night-bar-marker {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 20px;
      border-radius: 1px;
    }

    .night-bar-marker.first { background: #BA7517; }
    .night-bar-marker.half  { background: #185FA5; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin-top: 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text2);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      vertical-align: middle;
    }

    .info-box {
      margin-top: 18px;
      padding: 14px 18px;
      background: var(--info-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      line-height: 1.7;
      transition: background 0.25s;
    }

    /* Mobile Responsiveness */
    @media (max-width: 480px) {
      .app {
        padding: 24px 16px 32px;
      }
      .header h1 {
        font-size: 24px;
      }
      .inputs-row {
        gap: 12px;
      }
      .input-group input[type="time"] {
        font-size: 18px;
        padding: 10px 12px;
      }
      .result-card {
        padding: 14px 16px 14px 20px;
      }
      .result-card .card-label-ar {
        font-size: 16px;
      }
      .result-card .card-label-en {
        font-size: 10px;
      }
      .result-card .card-time {
        font-size: 20px;
      }
      .info-box {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="wrap">
      <div class="top-bar">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
          <span class="toggle-icon" id="theme-icon">☀️</span>
          <span id="theme-label">Light mode</span>
        </button>
      </div>

      <div class="header">
        <span class="moon-icon">🌙</span>
        <h1>Night Thirds Calculator</h1>
        <p>حاسبة أوقات الليل</p>
      </div>

      <div class="inputs-row">
        <div class="input-group">
          <span class="label-arabic">المغرب</span>
          <label>Maghrib</label>
          <input type="time" id="maghrib" value="18:30">
        </div>
        <div class="input-group">
          <span class="label-arabic">الفجر</span>
          <label>Fajr</label>
          <input type="time" id="fajr" value="05:15">
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">Calculate Night Times</button>

      <div class="error" id="error">Please enter valid Maghrib and Fajr times.</div>

      <div class="results" id="results">
        <hr class="divider">
        <div class="results-title">Night Breakdown</div>

        <div class="result-card first">
          <div class="card-labels">
            <span class="card-label-ar">نهاية الثلث الأول</span>
            <span class="card-label-en">End of first third</span>
          </div>
          <span class="card-time" id="third-time">—</span>
        </div>

        <div class="result-card half">
          <div class="card-labels">
            <span class="card-label-ar">منتصف الليل</span>
            <span class="card-label-en">Middle of the night</span>
          </div>
          <span class="card-time" id="half-time">—</span>
        </div>

        <div class="night-bar-wrap">
          <div class="night-bar-label">
            <span id="bar-start">Maghrib</span>
            <span id="bar-end">Fajr</span>
          </div>
          <div class="night-bar" id="night-bar">
            <div class="night-bar-fill" id="bar-fill"></div>
            <div class="night-bar-marker first" id="marker-third" style="left:33.3%"></div>
            <div class="night-bar-marker half"  id="marker-half"  style="left:50%"></div>
          </div>
          <div class="legend">
            <span><span class="legend-dot" style="background:#BA7517"></span>First third ends</span>
            <span><span class="legend-dot" style="background:#185FA5"></span>Midnight</span>
          </div>
        </div>

        <div class="info-box" id="night-duration-text"></div>
      </div>
    </div>
  </div>

  <script>
    let isDark = false;

    function toggleTheme() {
      isDark = !isDark;
      document.getElementById('app').classList.toggle('dark-mode', isDark);
      document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
      document.getElementById('theme-label').textContent = isDark ? 'Dark mode' : 'Light mode';
      updateBarColor();
    }

    function updateBarColor() {
      const fill = document.getElementById('bar-fill');
      if (!fill) return;
      fill.style.background = isDark
        ? 'linear-gradient(90deg, #0d0d1a 0%, #111827 50%, #0f2040 100%)'
        : 'linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
    }

    function toMinutes(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function formatTime(totalMinutes) {
      let mins = ((totalMinutes % 1440) + 1440) % 1440;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      const hh = h % 12 === 0 ? 12 : h % 12;
      const ampm = h < 12 ? 'AM' : 'PM';
      return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function format24(totalMinutes) {
      let mins = ((totalMinutes % 1440) + 1440) % 1440;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    function calculate() {
      const mv = document.getElementById('maghrib').value;
      const fv = document.getElementById('fajr').value;
      const errEl = document.getElementById('error');
      const resEl = document.getElementById('results');

      if (!mv || !fv) {
        errEl.classList.add('visible');
        resEl.classList.remove('visible');
        return;
      }

      errEl.classList.remove('visible');

      let maghrib = toMinutes(mv);
      let fajr    = toMinutes(fv);
      if (fajr <= maghrib) fajr += 1440;

      const duration = fajr - maghrib;
      const thirdMins = maghrib + Math.round(duration / 3);
      const halfMins  = maghrib + Math.round(duration / 2);

      document.getElementById('third-time').textContent = formatTime(thirdMins);
      document.getElementById('half-time').textContent  = formatTime(halfMins);

      const totalH = Math.floor(duration / 60);
      const totalM = duration % 60;
      const thirdH = Math.floor(duration / 3 / 60);
      const thirdM = Math.round((duration / 3) % 60);
      document.getElementById('night-duration-text').textContent =
        `Night duration: ${totalH}h ${totalM}m  ·  Each third: ${thirdH}h ${thirdM}m`;

      document.getElementById('bar-start').textContent = format24(maghrib);
      document.getElementById('bar-end').textContent   = format24(fajr);

      document.getElementById('marker-third').style.left = ((thirdMins - maghrib) / duration * 100).toFixed(1) + '%';
      document.getElementById('marker-half').style.left  = ((halfMins  - maghrib) / duration * 100).toFixed(1) + '%';

      updateBarColor();
      resEl.classList.add('visible');
    }

    calculate();
  </script>
</body>
</html>
