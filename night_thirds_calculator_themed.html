
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f4f3ef;
    --bg3: #eceae4;
    --text: #1a1a18;
    --text2: #5a5a55;
    --text3: #9a9890;
    --border: rgba(0,0,0,0.11);
    --border2: rgba(0,0,0,0.22);
    --btn-bg: #1a1a18;
    --btn-fg: #ffffff;
    --card-border: rgba(0,0,0,0.09);
    --bar-bg: #e0ddd5;
  }

  .dark-mode {
    --bg: #111110;
    --bg2: #1c1c1a;
    --bg3: #252522;
    --text: #e8e6df;
    --text2: #9a9890;
    --text3: #5a5a55;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.2);
    --btn-bg: #e8e6df;
    --btn-fg: #111110;
    --card-border: rgba(255,255,255,0.07);
    --bar-bg: #2a2a27;
  }

  .app {
    background: var(--bg);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
    padding: 24px 16px 48px;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    font-family: 'Amiri', serif;
  }

  .top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
  }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 40px;
  }
  .theme-toggle:hover { border-color: var(--border2); color: var(--text); }
  .toggle-icon { font-size: 15px; }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .moon-icon { font-size: 36px; display: block; margin-bottom: 8px; }
  .header h1 {
    font-size: clamp(22px, 6vw, 28px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .header p {
    font-size: clamp(13px, 4vw, 15px);
    color: var(--text2);
    margin-top: 5px;
    font-style: italic;
  }

  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .input-group .label-arabic {
    font-size: 19px;
    color: var(--text);
    display: block;
    margin-bottom: 1px;
    font-family: 'Amiri', serif;
    font-weight: 700;
  }
  .input-group label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }
  .input-group input[type="time"] {
    width: 100%;
    padding: 12px 10px;
    font-size: clamp(16px, 5vw, 22px);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.25s;
    cursor: pointer;
    -webkit-appearance: none;
    min-height: 52px;
  }
  .input-group input[type="time"]:focus { border-color: var(--border2); }

  .calc-btn {
    width: 100%;
    padding: 16px;
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: none;
    border-radius: 14px;
    font-size: clamp(15px, 4vw, 17px);
    font-family: 'Amiri', serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, background 0.25s, color 0.25s;
    margin-bottom: 28px;
    letter-spacing: 0.03em;
    min-height: 54px;
    -webkit-tap-highlight-color: transparent;
  }
  .calc-btn:active { opacity: 0.7; }

  .error {
    text-align: center;
    color: #c0392b;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    padding: 10px;
    display: none;
  }
  .error.visible { display: block; }

  .results { display: none; }
  .results.visible { display: block; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 22px;
  }

  .results-title {
    text-align: center;
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .result-card {
    border: 1.5px solid var(--card-border);
    background: var(--bg2);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    transition: background 0.25s;
    min-height: 68px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .result-card.first::before { background: #BA7517; }
  .result-card.half::before  { background: #185FA5; }

  .card-content { padding-right: 100px; }

  .result-card .card-label-ar {
    font-size: clamp(15px, 4vw, 18px);
    color: var(--text);
    display: block;
    font-family: 'Amiri', serif;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .result-card .card-label-en {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .result-card .card-time {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: clamp(18px, 5vw, 24px);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  .night-bar-wrap { margin-top: 22px; margin-bottom: 6px; }
  .night-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    margin-bottom: 7px;
  }
  .night-bar {
    height: 14px;
    border-radius: 7px;
    background: var(--bar-bg);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .night-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 7px;
    width: 100%;
  }
  .night-bar-marker {
    position: absolute;
    top: -4px;
    width: 2px;
    height: 22px;
    border-radius: 1px;
  }
  .night-bar-marker.first { background: #BA7517; }
  .night-bar-marker.half  { background: #185FA5; }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .info-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: clamp(11px, 3vw, 13px);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    line-height: 1.8;
    transition: background 0.25s;
  }

  @media (max-width: 360px) {
    .inputs-row { grid-template-columns: 1fr; gap: 12px; }
    .result-card .card-time { font-size: 16px; right: 12px; }
    .card-content { padding-right: 80px; }
  }
</style>

<div class="app" id="app">
  <div class="wrap">
    <div class="top-bar">
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        <span class="toggle-icon" id="theme-icon">☀️</span>
        <span id="theme-label">Light</span>
      </button>
    </div>

    <div class="header">
      <span class="moon-icon">🌙</span>
      <h1>Night Thirds Calculator</h1>
      <p>حاسبة أوقات الليل</p>
    </div>

    <div class="inputs-row">
      <div class="input-group">
        <span class="label-arabic">المغرب</span>
        <label>Maghrib</label>
        <input type="time" id="maghrib" value="18:30">
      </div>
      <div class="input-group">
        <span class="label-arabic">الفجر</span>
        <label>Fajr</label>
        <input type="time" id="fajr" value="05:15">
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Calculate Night Times</button>

    <div class="error" id="error">Please enter valid times.</div>

    <div class="results" id="results">
      <hr class="divider">
      <div class="results-title">Night Breakdown</div>

      <div class="result-card first">
        <div class="card-content">
          <span class="card-label-ar">نهاية الثلث الأول</span>
          <span class="card-label-en">End of first third</span>
        </div>
        <span class="card-time" id="third-time">—</span>
      </div>

      <div class="result-card half">
        <div class="card-content">
          <span class="card-label-ar">منتصف الليل</span>
          <span class="card-label-en">Middle of the night</span>
        </div>
        <span class="card-time" id="half-time">—</span>
      </div>

      <div class="night-bar-wrap">
        <div class="night-bar-label">
          <span id="bar-start">—</span>
          <span id="bar-end">—</span>
        </div>
        <div class="night-bar">
          <div class="night-bar-fill" id="bar-fill"></div>
          <div class="night-bar-marker first" id="marker-third" style="left:33.3%"></div>
          <div class="night-bar-marker half"  id="marker-half"  style="left:50%"></div>
        </div>
        <div class="legend">
          <span><span class="legend-dot" style="background:#BA7517"></span>First third ends</span>
          <span><span class="legend-dot" style="background:#185FA5"></span>Midnight</span>
        </div>
      </div>

      <div class="info-box" id="info-text"></div>
    </div>
  </div>
</div>

<script>
  let isDark = false;

  function toggleTheme() {
    isDark = !isDark;
    document.getElementById('app').classList.toggle('dark-mode', isDark);
    document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
    document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
    updateBarColor();
  }

  function updateBarColor() {
    const fill = document.getElementById('bar-fill');
    if (!fill) return;
    fill.style.background = isDark
      ? 'linear-gradient(90deg, #0d0d1a 0%, #111827 50%, #0f2040 100%)'
      : 'linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
  }

  function toMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function formatTime(totalMinutes) {
    let mins = ((totalMinutes % 1440) + 1440) % 1440;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    const hh = h % 12 === 0 ? 12 : h % 12;
    const ampm = h < 12 ? 'AM' : 'PM';
    return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function format24(totalMinutes) {
    let mins = ((totalMinutes % 1440) + 1440) % 1440;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function calculate() {
    const mv = document.getElementById('maghrib').value;
    const fv = document.getElementById('fajr').value;
    const errEl = document.getElementById('error');
    const resEl = document.getElementById('results');

    if (!mv || !fv) {
      errEl.classList.add('visible');
      resEl.classList.remove('visible');
      return;
    }

    errEl.classList.remove('visible');

    let maghrib = toMinutes(mv);
    let fajr    = toMinutes(fv);
    if (fajr <= maghrib) fajr += 1440;

    const duration  = fajr - maghrib;
    const thirdMins = maghrib + Math.round(duration / 3);
    const halfMins  = maghrib + Math.round(duration / 2);

    document.getElementById('third-time').textContent = formatTime(thirdMins);
    document.getElementById('half-time').textContent  = formatTime(halfMins);

    const totalH = Math.floor(duration / 60);
    const totalM = duration % 60;
    const thirdH = Math.floor(duration / 3 / 60);
    const thirdM = Math.round((duration / 3) % 60);

    document.getElementById('info-text').textContent =
      `Night: ${totalH}h ${totalM}m  ·  Each third: ${thirdH}h ${thirdM}m`;

    document.getElementById('bar-start').textContent = format24(maghrib);
    document.getElementById('bar-end').textContent   = format24(fajr);

    document.getElementById('marker-third').style.left = ((thirdMins - maghrib) / duration * 100).toFixed(1) + '%';
    document.getElementById('marker-half').style.left  = ((halfMins  - maghrib) / duration * 100).toFixed(1) + '%';

    updateBarColor();
    resEl.classList.add('visible');
  }

  calculate();
</script>
